# python analyze.py /data/media_analyzer/demo_media/BigBuckBunny.mp4
# python analyze.py /data/media_analyzer/demo_media/landscape.jpg
# python analyze.py /data/media_analyzer/demo_media/people.jpg
# python analyze.py /data/media_analyzer/demo_media/speech_audio.mp3

model:
  # 视觉模型（视频/图片分析）
  # 支持 HuggingFace ID 或本地绝对路径，例如：
  #   "Qwen/Qwen3-VL-8B-Instruct"          ← 在线下载
  #   "/data/models/Qwen3-VL-8B-Instruct"  ← 本地路径
  vision_model: "/data/models/Qwen3-VL-8B-Instruct"
  # 音频转写模型：whisper 模型名 或 本地 .pt 文件路径，例如：
  #   "large-v3"                            ← 在线下载
  #   "/data/models/whisper/large-v3.pt"   ← 本地路径
  whisper_model: "/data/models/large-v3"
  # 推理设备：auto / cuda / cpu / mps（Mac）
  device: "cuda"
  # 精度：bfloat16（推荐GPU）/ float16 / float32（CPU）
  torch_dtype: "bfloat16"
  # 最大新生成 token 数
  max_new_tokens: 2048

video:
  # 短视频阈值（秒），低于此值直接传入模型，无需手动提帧
  short_video_threshold: 180
  # 手动提帧时的帧率（fps），短视频忽略此项
  extract_fps: 1.0
  # 最大提帧数（防止超出 context window）
  max_frames: 64
  # 传入模型时每帧最大像素数（越小越快）
  max_pixels: 151200   # 360 * 420

audio:
  # Whisper 转写语言，null 为自动检测
  language: null
  # 是否分离视频音轨进行转写
  extract_audio_from_video: true

output:
  # 是否将结果保存为 JSON 文件
  save_results: true
  output_dir: "results"
  # 是否打印详细日志
  verbose: true

tmp:
  # 临时文件目录（提帧、音轨提取）
  tmp_dir: "tmp"
  # 运行结束后是否自动清理临时文件
  cleanup: true



